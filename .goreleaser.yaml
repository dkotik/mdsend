version: 2
before:
  hooks:
    - go generate ./...
    - go test ./...
builds:
  - main: ./cmd/mdsend
    id: "mdsend"
    binary: mdsend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
archives:
  - formats: ["zip"]
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^testdata"
homebrew_casks:
  - name: mdsend
    url:
      template: "https://github.com/dkotik/mdsend/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: github.com/dkotik/mdsend/
      # Never `using: ":homebrew_curl"` as it requires installing homebrew
      # curl before the cask itself can be installed
      # MacOS comes with curl installed already.
      using: ":homebrew_curl"
    repository:
      owner: dkotik
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/dkotik/mdsend"
    description: "Send markdown files as electronic mail. Maintain mailing lists as templated text files."
    license: "MIT"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mdsend"]
          end
nfpms:
  - id: mdsend.deb
    package_name: mdsend
    formats:
      - deb
    vendor: "Dmitry Kotik"
    homepage: "https://github.com/dkotik/mdsend"
    maintainer: "Dmitry Kotik <7bt7hnl6f@relay.firefox.com>"
    description: "Send markdown files as electronic mail. Maintain mailing lists as templated text files."
    license: "MIT"
signs:
  - id: cosign
    cmd: cosign
    args: ["sign-blob", "--bundle", "${signature}", "${artifact}", "--yes"]
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
